name: Build K3765-Z probe kernel

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-k3765-probe.yml"
      - "kernel/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out Shadow-MSM
        uses: actions/checkout@v4

      - name: Install ARM build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            bc \
            bison \
            build-essential \
            device-tree-compiler \
            flex \
            gcc-arm-linux-gnueabi \
            git \
            libelf-dev \
            libssl-dev

      - name: Fetch official Linux v6.1
        run: |
          git clone \
            --depth 1 \
            --branch v6.1 \
            https://github.com/torvalds/linux.git \
            linux-v6.1

      - name: Build and verify the RAM-only probe
        run: |
          ./kernel/build-k3765-probe.sh \
            ./linux-v6.1 \
            ./build/k3765-probe

      - name: Upload verified probe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shadow-msm-k3765-probe
          path: build/k3765-probe/artifacts/
          if-no-files-found: error
          retention-days: 30
